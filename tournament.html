<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bracket Tournament</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Orbitron', sans-serif;
  background: #020617;
  color: white;
  text-align: center;
}

/* TITLE */
h1 {
  margin: 20px;
  color: #60a5fa;
}

/* BRACKET CONTAINER */
.bracket {
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 20px;
  overflow-x: auto;
}

/* ROUND */
.round {
  display: flex;
  flex-direction: column;
  justify-content: space-around;
}

/* MATCH BOX */
.match {
  background: rgba(30,41,59,0.8);
  border: 1px solid rgba(59,130,246,0.3);
  border-radius: 10px;
  padding: 10px;
  margin: 20px 0;
  width: 150px;
  box-shadow: 0 0 10px rgba(59,130,246,0.3);
}

/* TEAM */
.team {
  padding: 8px;
  margin: 5px 0;
  background: rgba(2,6,23,0.8);
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

.team:hover {
  background: #3b82f6;
}

/* WINNER */
.winner {
  background: #22c55e !important;
}

/* FINAL */
.final {
  transform: scale(1.2);
}

/* MOBILE */
@media(max-width:768px){
  .bracket {
    gap: 20px;
  }
  .match {
    width: 120px;
  }
}
</style>
</head>

<body>

<h1>🏆 Tournament Bracket</h1>

<div class="bracket">

  <!-- ROUND 1 -->
  <div class="round">
    <div class="match">
      <div class="team">Team A</div>
      <div class="team">Team B</div>
    </div>
    <div class="match">
      <div class="team">Team C</div>
      <div class="team">Team D</div>
    </div>
    <div class="match">
      <div class="team">Team E</div>
      <div class="team">Team F</div>
    </div>
    <div class="match">
      <div class="team">Team G</div>
      <div class="team">Team H</div>
    </div>
  </div>

  <!-- SEMI FINAL -->
  <div class="round">
    <div class="match">
      <div class="team">Winner 1</div>
      <div class="team">Winner 2</div>
    </div>
    <div class="match">
      <div class="team">Winner 3</div>
      <div class="team">Winner 4</div>
    </div>
  </div>

  <!-- FINAL -->
  <div class="round">
    <div class="match final">
      <div class="team">Finalist 1</div>
      <div class="team">Finalist 2</div>
    </div>
  </div>

</div>

<script>
// klik untuk tandai pemenang
document.querySelectorAll('.team').forEach(team => {
  team.addEventListener('click', () => {

    const parent = team.parentElement;
    parent.querySelectorAll('.team').forEach(t => t.classList.remove('winner'));

    team.classList.add('winner');

  });
});
</script>

</body>
</html>
