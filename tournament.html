<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bracket Tournament</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Orbitron', sans-serif;
  background: 
    linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.95)),
    url('background.jpeg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  text-align: center;
}

h1 {
  margin: 20px;
  color: #60a5fa;
}

/* CONTAINER */
.bracket {
  display: flex;
  justify-content: center;
  gap: 80px;
  padding: 40px;
  overflow-x: auto;
}

/* ROUND */
.round {
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  position: relative;
}

/* MATCH */
.match {
  position: relative;
  background: rgba(30,41,59,0.8);
  border: 1px solid rgba(242, 10, 10, 0.3);
  border-radius: 10px;
  padding: 10px;
  margin: 40px 0;
  width: 160px;
  box-shadow: 0 0 10px rgba(1, 236, 123, 0.3);
}

/* TEAM */
.team {
  padding: 8px;
  margin: 5px 0;
  background: rgba(210, 162, 162, 0.8);
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

.team:hover {
  background: #3b82f6;
}

.winner {
  background: #22c55e !important;
}

/* FINAL */
.final {
  transform: scale(1.2);
}

/* ===== GARIS BRACKET ===== */

/* GARIS HORIZONTAL */
.connect::after {
  content: "";
  position: absolute;
  top: 50%;
  right: -60px;
  width: 60px;
  height: 2px;
  background: #3b82f6;
  box-shadow: 0 0 8px #3b82f6;
}

/* GARIS ATAS (┐) */
.connect.top::before {
  content: "";
  position: absolute;
  right: -60px;
  top: 50%;
  width: 2px;
  height: 60px;
  background: #3b82f6;
  box-shadow: 0 0 8px #3b82f6;
}

/* GARIS BAWAH (┘) */
.connect.bottom::before {
  content: "";
  position: absolute;
  right: -60px;
  top: calc(50% - 60px);
  width: 2px;
  height: 60px;
  background: #3b82f6;
  box-shadow: 0 0 8px #3b82f6;
}

/* MOBILE */
@media(max-width:768px){
  .bracket {
    gap: 40px;
  }
  .match {
    width: 130px;
  }
}
</style>
</head>

<body>

<h1>🏆 Tournament Bracket</h1>

<div class="bracket">

  <!-- ROUND 1 -->
  <div class="round">
    <div class="match connect top">
      <div class="team">Team A</div>
      <div class="team">Team B</div>
    </div>

    <div class="match connect bottom">
      <div class="team">Team C</div>
      <div class="team">Team D</div>
    </div>

    <div class="match connect top">
      <div class="team">Team E</div>
      <div class="team">Team F</div>
    </div>

    <div class="match connect bottom">
      <div class="team">Team G</div>
      <div class="team">Team H</div>
    </div>
  </div>

  <!-- SEMI FINAL -->
  <div class="round">
    <div class="match connect top">
      <div class="team">Winner 1</div>
      <div class="team">Winner 2</div>
    </div>

    <div class="match connect bottom">
      <div class="team">Winner 3</div>
      <div class="team">Winner 4</div>
    </div>
  </div>

  <!-- FINAL -->
  <div class="round">
    <div class="match final">
      <div class="team">Finalist 1</div>
      <div class="team">Finalist 2</div>
    </div>
  </div>

</div>

<script>
// klik winner
document.querySelectorAll('.team').forEach(team => {
  team.addEventListener('click', () => {
    const parent = team.parentElement;
    parent.querySelectorAll('.team').forEach(t => t.classList.remove('winner'));
    team.classList.add('winner');
  });
});
</script>

</body>
</html>
