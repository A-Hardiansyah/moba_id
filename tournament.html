<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Bracket Tournament</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Orbitron', sans-serif;
  background: 
    linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.95)),
    url('background.jpeg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  text-align: center;
}

h1 {
  margin: 20px;
  color: #60a5fa;
}
     nav {
    display: flex;
    justify-content: center;
    gap: 25px;
    padding: 15px;
    position: sticky;
    top: 0;
    z-index: 999;
    background: rgba(2, 6, 23, 0.8);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(59, 130, 246, 0.2);
    }
    
    .prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    border: none;
    color: white;
    font-size: 24px;
    padding: 10px 15px;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.3s;
    }

    .prev:hover, .next:hover {
    background: rgba(59,130,246,0.8);
    }

    .prev {
    left: 10px;
    }

    .next {
    right: 10px;
    }
    nav a {
    position: relative;
    color: #cbd5f5;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
    display: inline-block;
    }
    /* hover glow */
    nav a:hover {
    background: rgba(59,130,246,0.2);
    color: #60a5fa;
    transform: scale(1.1);
    text-shadow: 0 0 8px #3b82f6, 0 0 15px #60a5fa;
    }
    
    /* underline animasi */
    nav a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    left: 0;
    bottom: -5px;
    background: #3b82f6;
    transition: 0.3s;
    }

    nav a:hover::after {
    width: 100%;
    }

/* CONTAINER */
.bracket {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 3px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
}

/* ROUND */
.round {
  scroll-snap-align: center;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  position: relative;
}

/* MATCH */
.match {
  position: relative;
  background: rgba(30,41,59,0.8);
  border: 1px solid rgba(242, 10, 10, 0.3);
  border-radius: 10px;
  padding: 5px;
  margin: 40px 0;
  width: 120px;
  box-shadow: 0 0 10px rgba(1, 236, 123, 0.3);
}

/* TEAM */
.team {
  padding: 8px;
  margin: 5px 0;
  background: rgba(210, 162, 162, 0.8);
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.team:hover {
  background: #3b82f6;
}

.winner {
  background: #22c55e !important;
}

/* FINAL */
.final {
  transform: scale(1.2);
}

/* ===== GARIS BRACKET ===== */

/* GARIS HORIZONTAL */
.connect::after {
  content: "";
  position: absolute;
  top: 50%;
  right: -70px;
  width: 70px;
  height: 2px;
  background: #3b82f6;
  box-shadow: 0 0 8px #3b82f6;
}

/* GARIS ATAS (┐) */
.connect.top::before {
  content: "";
  position: absolute;
  right: -70px;
  top: 50%;
  width: 2px;
  height: 160px;
  background: #3b82f6;
  box-shadow: 0 0 8px #3b82f6;
}

/* GARIS BAWAH (┘) */
.connect.bottom::before {
  content: "";
  position: absolute;
  right: -70px;
  top: calc(50% - 160px);
  width: 2px;
  height: 160px;
  background: #3b82f6;
  box-shadow: 0 0 8px #3b82f6;
}

</style>
</head>

<body>
    <nav>
    <a class="home" href="home.html">Home</a>
    <a class="home" href="tournament.html">Tournament</a>
    <a class="home" href="regist.html">Register</a>
    <a class="home" href="contact.html">Contact</a>
    </nav>
<h1>🏆 Tournament Bracket</h1>

<div class="bracket">

  <!-- ROUND 1 -->
  <div class="round">
    <div class="match connect top">
      <div class="team">Team A</div>
      <div class="team">Team B</div>
    </div>

    <div class="match connect bottom">
      <div class="team">Team C</div>
      <div class="team">Team D</div>
    </div>

    <div class="match connect top">
      <div class="team">Team E</div>
      <div class="team">Team F</div>
    </div>

    <div class="match connect bottom">
      <div class="team">Team G</div>
      <div class="team">Team H</div>
    </div>
  </div>

  <!-- SEMI FINAL -->
  <div class="round">
    <div class="match connect top">
      <div class="team">Winner 1</div>
      <div class="team">Winner 2</div>
    </div>

    <div class="match connect bottom">
      <div class="team">Winner 3</div>
      <div class="team">Winner 4</div>
    </div>
  </div>

  <!-- FINAL -->
  <div class="round">
    <div class="match final">
      <div class="team">Finalist 1</div>
      <div class="team">Finalist 2</div>
    </div>
  </div>

</div>

<script>
// klik winner
document.querySelectorAll('.team').forEach(team => {
  team.addEventListener('click', () => {
    const parent = team.parentElement;
    parent.querySelectorAll('.team').forEach(t => t.classList.remove('winner'));
    team.classList.add('winner');
  });
});
</script>

</body>
</html>
