<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Contact - Aetos Finn Esports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Orbitron', sans-serif;
  background: #020617;
  color: white;
  text-align: center;
}

h1 {
  margin: 30px;
  color: #60a5fa;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(30,41,59,0.8);
  padding: 25px;
  border-radius: 15px;
  border: 1px solid rgba(59,130,246,0.3);
  box-shadow: 0 0 15px rgba(59,130,246,0.3);
}

/* ITEM */
.contact-item {
  margin: 20px 0;
}

.contact-item a {
  display: inline-block;
  padding: 12px 20px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(59,130,246,0.3);
}

/* WHATSAPP */
.wa {
  background: #22c55e;
}

.wa:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #22c55e;
}

/* INSTAGRAM */
.ig {
  background: linear-gradient(45deg, #f97316, #ec4899);
}

.ig:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #ec4899;
}

/* EMAIL */
.email {
  background: #3b82f6;
}

.email:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #3b82f6;
}

.subtitle {
  color: #94a3b8;
}
</style>
</head>

<body>

<h1>📞 Contact Us</h1>

<div class="container">
  <div class="card">

    <p class="subtitle">Hubungi kami untuk info turnamen & kerjasama</p>

    <div class="contact-item">
      <a class="wa" href="https://wa.me/6285882145918" target="_blank">
        💬 WhatsApp
      </a>
    </div>

    <div class="contact-item">
      <a class="ig" href="https://instagram.com/aetosfinn.esports" target="_blank">
        📸 Instagram
      </a>
    </div>

    <div class="contact-item">
      <a class="email" href="mailto:aetosfinn@gmail.com">
        ✉️ Email
      </a>
    </div>

  </div>
</div>

</body>
</html>
